<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お弁当作成支援アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <button id="historyBtn">履歴</button>
    <button id="openNgModal" class="ng-btn">入れたくないもの</button>

    <!-- ポップアップ（モーダル） -->
    <div id="ngModal" class="modal">
      <div class="modal-content">
        <span id="closeNgModal" class="close">&times;</span>
        <h3>入れたくないもの</h3>

        <div class="ng-category">
          <h4>主食</h4>
          <div id="ngStaple"></div>
        </div>

        <div class="ng-category">
          <h4>主菜</h4>
          <div id="ngMain"></div>
        </div>

        <div class="ng-category">
          <h4>副菜</h4>
          <div id="ngSide"></div>
        </div>

        <button id="closeNgModalBottom" class="close-btn">閉じる</button>
      </div>
    </div>
  </header>

  <main>
    <div class="selector-area">
      <div class="select-block">
        <label>主食</label>
        <select id="stapleSelect"></select>
      </div>

      <div class="select-block">
        <label>主菜</label>
        <select id="mainSelect"></select>
      </div>

      <div class="select-block">
        <label>副菜</label>
        <select id="sideSelect"></select>
      </div>
    </div>

    <button id="generateBtn">提案する</button>

    <section class="result">
      <h2>提案結果</h2>
      <div id="resultArea">ここに結果が表示されます</div>
    </section>
  </main>

  <!-- 履歴ポップアップ -->
  <div id="historyPopup" class="popup hidden">
    <div class="popup-content">
      <h3>過去3日分の履歴</h3>
      <div id="historyList"></div>
      <button id="closeHistory">閉じる</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
